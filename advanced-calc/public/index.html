<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Mathematical Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d9ff;
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-size: 16px;
        }

        .tab-btn:hover, .tab-btn.active {
            background: #00d9ff;
            color: #1a1a2e;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Calculator Styles */
        .calculator {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .display {
            background: #0a0a1a;
            border: 2px solid #00d9ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 120px;
        }

        .expression {
            font-size: 18px;
            color: #888;
            min-height: 25px;
            word-wrap: break-word;
        }

        .result {
            font-size: 36px;
            color: #00d9ff;
            text-align: right;
            font-weight: bold;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 217, 255, 0.3);
        }

        .btn.operator {
            background: rgba(0, 217, 255, 0.2);
        }

        .btn.function {
            background: rgba(255, 100, 100, 0.2);
        }

        .btn.equals {
            background: #00d9ff;
            color: #1a1a2e;
            grid-column: span 2;
        }

        .btn.clear {
            background: rgba(255, 50, 50, 0.3);
        }

        /* Graph Styles */
        .graph-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .graph-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .graph-input input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00d9ff;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
        }

        .graph-input button {
            padding: 12px 24px;
            background: #00d9ff;
            border: none;
            border-radius: 5px;
            color: #1a1a2e;
            cursor: pointer;
            font-weight: bold;
        }

        #graphCanvas {
            width: 100%;
            height: 500px;
            background: #0a0a1a;
            border-radius: 10px;
            border: 2px solid #00d9ff;
        }

        .graph-controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .graph-controls label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .graph-controls input {
            width: 80px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00d9ff;
            border-radius: 3px;
            color: #fff;
        }

        /* Algebra Solver Styles */
        .algebra-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .algebra-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .algebra-input input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00d9ff;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
        }

        .algebra-input button {
            padding: 12px 24px;
            background: #00d9ff;
            border: none;
            border-radius: 5px;
            color: #1a1a2e;
            cursor: pointer;
            font-weight: bold;
        }

        .solution-display {
            background: #0a0a1a;
            border: 2px solid #00d9ff;
            border-radius: 10px;
            padding: 20px;
            min-height: 150px;
        }

        .solution-steps {
            margin-top: 20px;
        }

        .step {
            padding: 10px;
            margin: 5px 0;
            background: rgba(0, 217, 255, 0.1);
            border-left: 3px solid #00d9ff;
            border-radius: 3px;
        }

        .mode-indicator {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .mode-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .mode-btn.active {
            background: #00d9ff;
            color: #1a1a2e;
        }

        .history {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .history-item:hover {
            background: rgba(0, 217, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Advanced Mathematical Calculator</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('calculator')">Calculator</button>
            <button class="tab-btn" onclick="switchTab('graphing')">Graphing</button>
            <button class="tab-btn" onclick="switchTab('algebra')">Algebra Solver</button>
        </div>

        <!-- Calculator Tab -->
        <div id="calculator" class="tab-content active">
            <div class="calculator">
                <div class="mode-indicator">
                    <button class="mode-btn active" id="degBtn" onclick="setAngleMode('DEG')">DEG</button>
                    <button class="mode-btn" id="radBtn" onclick="setAngleMode('RAD')">RAD</button>
                    <button class="mode-btn" id="gradBtn" onclick="setAngleMode('GRAD')">GRAD</button>
                </div>
                
                <div class="display">
                    <div class="expression" id="expression"></div>
                    <div class="result" id="result">0</div>
                </div>

                <div class="buttons">
                    <button class="btn clear" onclick="clearAll()">AC</button>
                    <button class="btn clear" onclick="clearEntry()">CE</button>
                    <button class="btn function" onclick="appendFunc('sqrt(')">&radic;</button>
                    <button class="btn function" onclick="appendFunc('sin(')">sin</button>
                    <button class="btn function" onclick="appendFunc('cos(')">cos</button>
                    <button class="btn function" onclick="appendFunc('tan(')">tan</button>

                    <button class="btn function" onclick="appendFunc('asin(')">sin&superscript;-1</button>
                    <button class="btn function" onclick="appendFunc('acos(')">cos&superscript;-1</button>
                    <button class="btn function" onclick="appendFunc('atan(')">tan&superscript;-1</button>
                    <button class="btn function" onclick="appendValue('(')">(</button>
                    <button class="btn function" onclick="appendValue(')')">)</button>
                    <button class="btn operator" onclick="appendValue('/')">&divide;</button>

                    <button class="btn function" onclick="appendFunc('log(')">log</button>
                    <button class="btn function" onclick="appendFunc('ln(')">ln</button>
                    <button class="btn" onclick="appendValue('7')">7</button>
                    <button class="btn" onclick="appendValue('8')">8</button>
                    <button class="btn" onclick="appendValue('9')">9</button>
                    <button class="btn operator" onclick="appendValue('*')">&times;</button>

                    <button class="btn function" onclick="appendFunc('exp(')">e&circ;</button>
                    <button class="btn function" onclick="appendValue('^')">x&circ;y</button>
                    <button class="btn" onclick="appendValue('4')">4</button>
                    <button class="btn" onclick="appendValue('5')">5</button>
                    <button class="btn" onclick="appendValue('6')">6</button>
                    <button class="btn operator" onclick="appendValue('-')">-</button>

                    <button class="btn function" onclick="appendFunc('abs(')">|x|</button>
                    <button class="btn function" onclick="appendValue('pi')">π</button>
                    <button class="btn" onclick="appendValue('1')">1</button>
                    <button class="btn" onclick="appendValue('2')">2</button>
                    <button class="btn" onclick="appendValue('3')">3</button>
                    <button class="btn operator" onclick="appendValue('+')">+</button>

                    <button class="btn function" onclick="appendValue('e')">e</button>
                    <button class="btn function" onclick="appendFunc('fact(')">n!</button>
                    <button class="btn" onclick="appendValue('0')">0</button>
                    <button class="btn" onclick="appendValue('.')">.</button>
                    <button class="btn function" onclick="toggleSign()">+/-</button>
                    <button class="btn equals" onclick="calculate()">=</button>
                </div>

                <div class="history" id="calcHistory">
                    <h3 style="margin-bottom: 10px; color: #00d9ff;">History</h3>
                    <div id="historyList"></div>
                </div>
            </div>
        </div>

        <!-- Graphing Tab -->
        <div id="graphing" class="tab-content">
            <div class="graph-container">
                <div class="graph-input">
                    <input type="text" id="graphExpr1" placeholder="Enter function (e.g., sin(x), x^2, etc.)" value="sin(x)">
                    <input type="text" id="graphExpr2" placeholder="Optional second function">
                    <button onclick="plotGraph()">Plot</button>
                </div>
                
                <canvas id="graphCanvas"></canvas>
                
                <div class="graph-controls">
                    <label>X Min: <input type="number" id="xMin" value="-10"></label>
                    <label>X Max: <input type="number" id="xMax" value="10"></label>
                    <label>Y Min: <input type="number" id="yMin" value="-10"></label>
                    <label>Y Max: <input type="number" id="yMax" value="10"></label>
                </div>
            </div>
        </div>

        <!-- Algebra Solver Tab -->
        <div id="algebra" class="tab-content">
            <div class="algebra-container">
                <div class="algebra-input">
                    <input type="text" id="algebraEq" placeholder="Enter equation (e.g., x^2 - 4 = 0 or simplify x^2 + 2x + 1)">
                    <input type="text" id="algebraVar" placeholder="Variable" value="x" style="max-width: 100px;">
                    <button onclick="solveAlgebra()">Solve</button>
                </div>
                
                <div class="solution-display">
                    <h3 style="color: #00d9ff; margin-bottom: 15px;">Solution</h3>
                    <div id="solutionResult">Enter an equation to solve...</div>
                </div>
                
                <div class="solution-steps" id="solutionSteps"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
