<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Scientific Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        .header {
            background: linear-gradient(90deg, #2c3e50, #34495e);
            color: white;
            padding: 15px 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5em;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .display-section {
            background: #1a1a2e;
            padding: 25px;
            color: #00ff88;
        }

        .expression {
            font-size: 1.1em;
            min-height: 30px;
            opacity: 0.7;
            word-wrap: break-word;
            margin-bottom: 10px;
        }

        .result {
            font-size: 2.5em;
            font-weight: bold;
            text-align: right;
            word-wrap: break-word;
            min-height: 50px;
        }

        .memory-display {
            background: #2c3e50;
            color: #00ff88;
            padding: 8px 15px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mode-indicators {
            display: flex;
            gap: 15px;
        }

        .mode-indicator {
            padding: 3px 10px;
            background: #34495e;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .mode-indicator.active {
            background: #00ff88;
            color: #1a1a2e;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            padding: 20px;
            background: #ecf0f1;
        }

        button {
            padding: 15px 10px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-number {
            background: #ffffff;
            color: #2c3e50;
            font-weight: 600;
        }

        .btn-operator {
            background: #3498db;
            color: white;
            font-weight: 600;
        }

        .btn-function {
            background: #9b59b6;
            color: white;
            font-size: 0.9em;
        }

        .btn-scientific {
            background: #e74c3c;
            color: white;
            font-size: 0.85em;
        }

        .btn-memory {
            background: #f39c12;
            color: white;
            font-size: 0.85em;
        }

        .btn-equals {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            font-weight: bold;
            grid-column: span 2;
        }

        .btn-clear {
            background: #e74c3c;
            color: white;
        }

        .btn-delete {
            background: #e67e22;
            color: white;
        }

        .history-panel {
            background: #f8f9fa;
            padding: 15px 20px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 2px solid #bdc3c7;
        }

        .history-title {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item {
            padding: 8px;
            background: white;
            margin-bottom: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: #ecf0f1;
        }

        .history-expression {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .history-result {
            color: #2c3e50;
            font-weight: 600;
        }

        .clear-history {
            background: #e74c3c;
            color: white;
            padding: 5px 10px;
            font-size: 0.8em;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .keypad {
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
                padding: 10px;
            }

            .btn-scientific, .btn-memory {
                display: none;
            }

            .result {
                font-size: 2em;
            }

            button {
                padding: 12px 8px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="header">
            <h1>ADVANCED SCIENTIFIC CALCULATOR</h1>
        </div>

        <div class="display-section">
            <div class="memory-display">
                <div class="memory-info">
                    <span id="memory-status">M: --</span>
                    <span style="margin-left: 15px;">Base: <span id="base-mode">DEC</span></span>
                </div>
                <div class="mode-indicators">
                    <span class="mode-indicator active" id="deg-mode">DEG</span>
                    <span class="mode-indicator" id="rad-mode">RAD</span>
                    <span class="mode-indicator" id="grad-mode">GRAD</span>
                </div>
            </div>
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <div class="keypad">
            <!-- Row 1: Memory and Mode -->
            <button class="btn-memory" onclick="memoryClear()">MC</button>
            <button class="btn-memory" onclick="memoryRecall()">MR</button>
            <button class="btn-memory" onclick="memoryAdd()">M+</button>
            <button class="btn-memory" onclick="memorySubtract()">M-</button>
            <button class="btn-memory" onclick="toggleAngleMode()">ANG</button>
            <button class="btn-memory" onclick="toggleBase()">BASE</button>

            <!-- Row 2: Scientific Functions -->
            <button class="btn-scientific" onclick="inputFunction('sin')">sin</button>
            <button class="btn-scientific" onclick="inputFunction('cos')">cos</button>
            <button class="btn-scientific" onclick="inputFunction('tan')">tan</button>
            <button class="btn-scientific" onclick="inputFunction('asin')">sin⁻¹</button>
            <button class="btn-scientific" onclick="inputFunction('acos')">cos⁻¹</button>
            <button class="btn-scientific" onclick="inputFunction('atan')">tan⁻¹</button>

            <!-- Row 3: More Scientific -->
            <button class="btn-scientific" onclick="inputFunction('sinh')">sinh</button>
            <button class="btn-scientific" onclick="inputFunction('cosh')">cosh</button>
            <button class="btn-scientific" onclick="inputFunction('tanh')">tanh</button>
            <button class="btn-scientific" onclick="inputFunction('log')">log</button>
            <button class="btn-scientific" onclick="inputFunction('ln')">ln</button>
            <button class="btn-scientific" onclick="inputFunction('exp')">eˣ</button>

            <!-- Row 4: Advanced Math -->
            <button class="btn-scientific" onclick="inputFunction('sqrt')">√</button>
            <button class="btn-scientific" onclick="inputFunction('cbrt')">∛</button>
            <button class="btn-scientific" onclick="inputOperator('^')">xʸ</button>
            <button class="btn-scientific" onclick="inputFunction('square')">x²</button>
            <button class="btn-scientific" onclick="inputFunction('cube')">x³</button>
            <button class="btn-scientific" onclick="inputFunction('factorial')">n!</button>

            <!-- Row 5: Constants and Parentheses -->
            <button class="btn-function" onclick="inputConstant('pi')">π</button>
            <button class="btn-function" onclick="inputConstant('e')">e</button>
            <button class="btn-function" onclick="inputParenthesis('(')">(</button>
            <button class="btn-function" onclick="inputParenthesis(')')">)</button>
            <button class="btn-function" onclick="inputFunction('abs')">|x|</button>
            <button class="btn-function" onclick="inputFunction('mod')">mod</button>

            <!-- Row 6: Numbers 7-9 and operators -->
            <button class="btn-number" onclick="inputNumber('7')">7</button>
            <button class="btn-number" onclick="inputNumber('8')">8</button>
            <button class="btn-number" onclick="inputNumber('9')">9</button>
            <button class="btn-delete" onclick="deleteChar()">DEL</button>
            <button class="btn-clear" onclick="clearAll()">AC</button>
            <button class="btn-operator" onclick="inputOperator('/')">÷</button>

            <!-- Row 7: Numbers 4-6 and operators -->
            <button class="btn-number" onclick="inputNumber('4')">4</button>
            <button class="btn-number" onclick="inputNumber('5')">5</button>
            <button class="btn-number" onclick="inputNumber('6')">6</button>
            <button class="btn-operator" onclick="inputOperator('*')">×</button>
            <button class="btn-operator" onclick="inputOperator('-')">−</button>
            <button class="btn-operator" onclick="inputOperator('+')">+</button>

            <!-- Row 8: Numbers 0-3, decimal, equals -->
            <button class="btn-number" onclick="inputNumber('1')">1</button>
            <button class="btn-number" onclick="inputNumber('2')">2</button>
            <button class="btn-number" onclick="inputNumber('3')">3</button>
            <button class="btn-number" onclick="inputNumber('0')">0</button>
            <button class="btn-number" onclick="inputDecimal()">.</button>
            <button class="btn-equals" onclick="calculate()">=</button>
        </div>

        <div class="history-panel">
            <div class="history-title">
                <span>Calculation History</span>
                <button class="clear-history" onclick="clearHistory()">Clear</button>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        let expression = '';
        let resultDisplayed = false;
        let memory = 0;
        let angleMode = 'deg'; // deg, rad, grad
        let baseMode = 'dec'; // dec, bin, oct, hex
        let history = [];

        const expressionDisplay = document.getElementById('expression');
        const resultDisplay = document.getElementById('result');
        const memoryStatus = document.getElementById('memory-status');
        const baseModeDisplay = document.getElementById('base-mode');
        const historyList = document.getElementById('history-list');

        function updateDisplay() {
            expressionDisplay.textContent = expression || '';
            if (!resultDisplayed) {
                try {
                    const preview = evaluateExpression(expression);
                    if (!isNaN(preview) && isFinite(preview)) {
                        resultDisplay.textContent = formatNumber(preview);
                    }
                } catch (e) {
                    // Don't show error in preview
                }
            }
        }

        function inputNumber(num) {
            if (resultDisplayed) {
                expression = num;
                resultDisplayed = false;
            } else {
                expression += num;
            }
            updateDisplay();
        }

        function inputDecimal() {
            if (resultDisplayed) {
                expression = '0.';
                resultDisplayed = false;
            } else {
                const lastNumber = expression.match(/[\d.]+$/);
                if (!lastNumber || !lastNumber[0].includes('.')) {
                    expression += '.';
                }
            }
            updateDisplay();
        }

        function inputOperator(op) {
            resultDisplayed = false;
            if (expression === '' && op === '-') {
                expression = '-';
            } else if (expression !== '') {
                const lastChar = expression.slice(-1);
                if (['+', '-', '*', '/', '^'].includes(lastChar)) {
                    expression = expression.slice(0, -1) + op;
                } else {
                    expression += op;
                }
            }
            updateDisplay();
        }

        function inputFunction(func) {
            if (resultDisplayed) {
                expression = func + '(' + resultDisplay.textContent + ')';
                resultDisplayed = false;
            } else {
                expression += func + '(';
            }
            updateDisplay();
        }

        function inputConstant(constName) {
            const constants = {
                'pi': Math.PI.toString(),
                'e': Math.E.toString()
            };
            if (resultDisplayed) {
                expression = constants[constName];
                resultDisplayed = false;
            } else {
                expression += constants[constName];
            }
            updateDisplay();
        }

        function inputParenthesis(paren) {
            if (resultDisplayed && paren === '(') {
                expression = '(';
                resultDisplayed = false;
            } else {
                expression += paren;
            }
            updateDisplay();
        }

        function deleteChar() {
            if (resultDisplayed) {
                clearAll();
            } else {
                expression = expression.slice(0, -1);
                updateDisplay();
            }
        }

        function clearAll() {
            expression = '';
            resultDisplayed = false;
            resultDisplay.textContent = '0';
            updateDisplay();
        }

        function toRadians(value) {
            switch (angleMode) {
                case 'deg': return value * Math.PI / 180;
                case 'grad': return value * Math.PI / 200;
                default: return value;
            }
        }

        function fromRadians(radians) {
            switch (angleMode) {
                case 'deg': return radians * 180 / Math.PI;
                case 'grad': return radians * 200 / Math.PI;
                default: return radians;
            }
        }

        function factorial(n) {
            if (n < 0) throw new Error('Factorial of negative number');
            if (n === 0 || n === 1) return 1;
            if (n > 170) throw new Error('Number too large');
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        function evaluateExpression(expr) {
            if (!expr) return 0;

            // Replace display operators with JS operators
            expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');

            // Handle scientific functions
            expr = expr.replace(/sin\(/g, `Math.sin(toRadians(`);
            expr = expr.replace(/cos\(/g, `Math.cos(toRadians(`);
            expr = expr.replace(/tan\(/g, `Math.tan(toRadians(`);
            expr = expr.replace(/asin\(/g, `(fromRadians(Math.asin(`);
            expr = expr.replace(/acos\(/g, `(fromRadians(Math.acos(`);
            expr = expr.replace(/atan\(/g, `(fromRadians(Math.atan(`);
            expr = expr.replace(/sinh\(/g, `Math.sinh(`);
            expr = expr.replace(/cosh\(/g, `Math.cosh(`);
            expr = expr.replace(/tanh\(/g, `Math.tanh(`);
            expr = expr.replace(/log\(/g, `Math.log10(`);
            expr = expr.replace(/ln\(/g, `Math.log(`);
            expr = expr.replace(/exp\(/g, `Math.exp(`);
            expr = expr.replace(/sqrt\(/g, `Math.sqrt(`);
            expr = expr.replace(/cbrt\(/g, `Math.cbrt(`);
            expr = expr.replace(/square\(/g, `Math.pow(`);
            expr = expr.replace(/cube\(/g, `Math.pow(`);
            expr = expr.replace(/abs\(/g, `Math.abs(`);
            expr = expr.replace(/mod\(/g, `%`);

            // Handle power operator
            expr = expr.replace(/\^/g, '**');

            // Handle factorial (simple cases)
            expr = expr.replace(/(\d+)!/g, 'factorial($1)');

            // Handle square and cube functions specially
            expr = expr.replace(/Math\.pow\(([^)]+)\)/g, 'Math.pow($1, 2)');
            // This is a simplification - full parsing would be more complex

            // Evaluate with safety checks
            const safeEval = new Function('toRadians', 'fromRadians', 'factorial', 'return (' + expr + ')');
            return safeEval(toRadians, fromRadians, factorial);
        }

        function formatNumber(num) {
            if (Number.isInteger(num)) {
                return num.toLocaleString();
            }
            if (Math.abs(num) < 0.000001 || Math.abs(num) > 1e15) {
                return num.toExponential(6);
            }
            return parseFloat(num.toPrecision(12)).toLocaleString();
        }

        function calculate() {
            try {
                const result = evaluateExpression(expression);
                
                if (isNaN(result) || !isFinite(result)) {
                    throw new Error('Invalid result');
                }

                const formattedResult = formatNumber(result);
                
                // Add to history
                if (expression) {
                    addToHistory(expression, formattedResult);
                }

                resultDisplay.textContent = formattedResult;
                expression = formattedResult.replace(/,/g, '');
                resultDisplayed = true;

                // Store in memory for chain calculations
                memory = result;
            } catch (error) {
                resultDisplay.textContent = 'Error';
                expression = '';
                resultDisplayed = true;
            }
        }

        function memoryClear() {
            memory = 0;
            memoryStatus.textContent = 'M: --';
        }

        function memoryRecall() {
            if (resultDisplayed) {
                expression = memory.toString();
                resultDisplayed = false;
            } else {
                expression += memory.toString();
            }
            updateDisplay();
        }

        function memoryAdd() {
            try {
                const current = resultDisplayed ? parseFloat(resultDisplay.textContent.replace(/,/g, '')) : evaluateExpression(expression);
                memory += current;
                memoryStatus.textContent = 'M: ' + formatNumber(memory);
                resultDisplayed = true;
            } catch (e) {
                // Ignore errors
            }
        }

        function memorySubtract() {
            try {
                const current = resultDisplayed ? parseFloat(resultDisplay.textContent.replace(/,/g, '')) : evaluateExpression(expression);
                memory -= current;
                memoryStatus.textContent = 'M: ' + formatNumber(memory);
                resultDisplayed = true;
            } catch (e) {
                // Ignore errors
            }
        }

        function toggleAngleMode() {
            const modes = ['deg', 'rad', 'grad'];
            const currentIndex = modes.indexOf(angleMode);
            angleMode = modes[(currentIndex + 1) % modes.length];

            document.getElementById('deg-mode').classList.toggle('active', angleMode === 'deg');
            document.getElementById('rad-mode').classList.toggle('active', angleMode === 'rad');
            document.getElementById('grad-mode').classList.toggle('active', angleMode === 'grad');
        }

        function toggleBase() {
            const modes = ['dec', 'bin', 'oct', 'hex'];
            const currentIndex = modes.indexOf(baseMode);
            baseMode = modes[(currentIndex + 1) % modes.length];

            const baseNames = { 'dec': 'DEC', 'bin': 'BIN', 'oct': 'OCT', 'hex': 'HEX' };
            baseModeDisplay.textContent = baseNames[baseMode];

            // Convert current result if displayed
            if (resultDisplayed && expression) {
                try {
                    const num = parseInt(expression);
                    if (baseMode === 'bin') {
                        resultDisplay.textContent = num.toString(2);
                    } else if (baseMode === 'oct') {
                        resultDisplay.textContent = num.toString(8);
                    } else if (baseMode === 'hex') {
                        resultDisplay.textContent = num.toString(16).toUpperCase();
                    } else {
                        resultDisplay.textContent = formatNumber(num);
                    }
                } catch (e) {
                    // Ignore conversion errors
                }
            }
        }

        function addToHistory(expr, result) {
            history.unshift({ expression: expr, result: result });
            if (history.length > 10) {
                history.pop();
            }
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="loadFromHistory(${index})">
                    <div class="history-expression">${item.expression}</div>
                    <div class="history-result">= ${item.result}</div>
                </div>
            `).join('');
        }

        function loadFromHistory(index) {
            expression = history[index].result.replace(/,/g, '');
            resultDisplayed = true;
            resultDisplay.textContent = history[index].result;
            updateDisplay();
        }

        function clearHistory() {
            history = [];
            renderHistory();
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') {
                inputNumber(e.key);
            } else if (e.key === '.') {
                inputDecimal();
            } else if (['+', '-', '*', '/'].includes(e.key)) {
                inputOperator(e.key);
            } else if (e.key === '^') {
                inputOperator('^');
            } else if (e.key === 'Enter' || e.key === '=') {
                calculate();
            } else if (e.key === 'Backspace') {
                deleteChar();
            } else if (e.key === 'Escape') {
                clearAll();
            } else if (e.key === '(' || e.key === ')') {
                inputParenthesis(e.key);
            }
        });

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
